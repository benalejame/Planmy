<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta charset="UTF-8">
	<title>Simulador PlanMy iPhone</title>
	<style type="text/css" media="print">body {visibility: hidden; display: none;}</style>
	<style>
		:root {
			--bg-primary: #f5f5f7; --bg-card: #ffffff; --text-primary: #1d1d1f; --text-secondary: #86868b;
			--accent: #0071e3; --accent-hover: #0077ed; --border-color: #d2d2d7;
			--radius-lg: 14px; --radius-md: 10px; --radius-sm: 5px;
			--shadow-strong: 0 6px 25px rgba(0, 0, 0, 0.06); --green-total: #34c759; --red-interest: #ff3b30;
		}
		body { background-color: var(--bg-primary); color: var(--text-primary); font-family: -apple-system, sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
		#cuerpo { width: 96%; max-width: 100%; margin: 15px auto; padding: 20px 25px; background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow-strong); box-sizing: border-box; }
		h2 { font-size: 1.8rem; font-weight: 700; text-align: center; margin: 0 0 20px 0; }
		.simulador-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 25px; align-items: start; }
		.col-izquierda { display: flex; flex-direction: column; gap: 12px; }
		.section-card { background: #ffffff; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px; }
		.section-title { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; }
		.control-checkbox, .bono-container { display: flex; align-items: center; background: #f5f5f7; padding: 10px 14px; border-radius: var(--radius-md); font-size: 0.9rem; border: 1px solid var(--border-color); }
		.bono-container { margin-top: 5px; }
		.bono-container input { border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 5px; width: 100%; margin-left: 10px; }
		.button-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 6px; padding: 10px; }
		button.pill-btn { background: #f5f5f7; border: 1px solid var(--border-color); padding: 6px 4px; border-radius: var(--radius-sm); cursor: pointer; }
		button.pill-btn.selected { background: var(--accent); color: #fff; }
		.resultado-card { background: #f5f5f7; border-radius: var(--radius-md); padding: 20px; text-align: center; border: 1px solid #e8e8ed; }
		.precio-enlace { font-size: 1.8rem; color: var(--accent); font-weight: 800; text-decoration: none; border-bottom: 2px dashed var(--accent); }
		.cuota-highlight { font-size: 1.3rem; color: var(--accent); font-weight: 700; }
		.total-verde { color: var(--green-total); font-weight: 700; }
		.interes-rojo { color: var(--red-interest); font-weight: 700; }
		.aviso-footer { margin-top: 15px; font-size: 0.8rem; color: var(--text-secondary); text-align: center; }
		.firma-autor { font-size: 0.75rem; color: #a1a1a6; margin-top: 8px; display: block; }
	</style>
</head>
<body>
	<div id="cuerpo">
		<h2>Simulador PlanMy</h2>
		<div id="upload-container" class="loading-card"><p>Cargando datos...</p></div>
		<div class="simulador-grid" id="workspace" style="display: none;">
			<div class="col-izquierda">
				<div class="section-card"><div class="section-title">Gama iPhone</div><div id="list-container"></div></div>
				<div id="capacidad-section" class="section-card" style="display: none;"><div class="section-title">Capacidad</div><div id="capacidad-grid" class="button-grid"></div></div>
				<div id="exencion-container" class="control-checkbox" style="display:none;">
					<label><input type="checkbox" id="soloSegundoAnio"> Exención intereses 1er año</label>
				</div>
				<div id="bono-container" class="bono-container" style="display:none;">
					<label>Compras (€/mes):</label>
					<input type="number" id="importe-compras" placeholder="0">
				</div>
			</div>
			<div class="col-derecha"><div id="resultado"><div class="placeholder-resultado">Selecciona modelo y capacidad.</div></div></div>
			<div class="aviso-footer"><hr><b>Valores orientativos.</b><br>No imprimas esta pantalla.<span class="firma-autor">Ben A. M. © <span id="rango-fechas">2026</span></span></div>
		</div>
	</div>

	<script>
		let datos={}, modelo="", VR=0, VR2=0, PV=0;
		const scroll = () => setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 50);
		const round = v => Math.round((v + Number.EPSILON) * 100) / 100;
		const calcula = (pv, r, n, fv) => (r * (pv - fv / Math.pow(1 + r, n))) / (1 - Math.pow(1 + r, -n));

		fetch('PVP y RV.csv').then(r => r.text()).then(t => {
			t.split(/\r?\n/).slice(1).forEach(l => {
				let c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
				if(c.length<3) return;
				let mod = c[0].replace(/"/g,"").replace(/(128GB|256GB|512GB|1TB|2TB)/i,"").trim();
				if(!datos[mod]) datos[mod] = {};
				datos[mod][c[0].match(/(128GB|256GB|512GB|1TB|2TB)/i)[0].replace(/GB/i," GB").replace(/TB/i," TB")] = {PVP: parseFloat(c[1].replace(/[€",]/g,"")), VR: parseFloat(c[2].replace(/[€",]/g,"")), VR2: parseFloat(c[3]||0)};
			});
			document.getElementById("upload-container").style.display="none";
			document.getElementById("workspace").style.display="grid";
			Object.keys(datos).forEach(m => {
				const btn = document.createElement("button");
				btn.className = "pill-btn"; btn.textContent = m;
				btn.onclick = () => {
					modelo = m;
					document.getElementById("capacidad-section").style.display="block";
					document.getElementById("capacidad-grid").innerHTML="";
					document.getElementById("exencion-container").style.display = (m.includes("17") || m.includes("Air")) ? "flex" : "none";
					if(!(m.includes("17") || m.includes("Air"))) document.getElementById("soloSegundoAnio").checked = false;
					Object.keys(datos[m]).forEach(cap => {
						const b = document.createElement("button"); b.className="pill-btn"; b.textContent=cap;
						b.onclick = () => { PV=datos[m][cap].PVP; VR=datos[m][cap].VR; VR2=datos[m][cap].VR2; dibuja(); scroll(); };
						document.getElementById("capacidad-grid").appendChild(b);
					});
				};
				document.getElementById("list-container").appendChild(btn);
			});
		});

		function dibuja() {
			const exento = document.getElementById('soloSegundoAnio').checked, compras = parseFloat(document.getElementById('importe-compras').value)||0, r24=10.57/1200;
			let bono = compras > 650 ? 30 : (compras > 325 ? 20 : (compras > 125 ? 10 : 0));
			document.getElementById("bono-container").style.display = exento ? "flex" : "none";
			
			let p1=0, p2=0, tot=0;
			if(exento) {
				p1 = (PV-VR)/24; p2 = calcula(PV, r24, 24, VR);
				tot = (p1*12) + (p2*12) + VR - (bono*24);
			} else {
				p2 = calcula(PV, r24, 24, VR); tot = (p2*24) + VR - (bono*24);
			}

			document.getElementById("resultado").innerHTML = `<div class="resultado-card"><h3>Cálculo</h3><a class="precio-enlace">${PV} €</a><hr>
				${exento ? `<div class="cuota-bloque"><span class="cuota-numero-azul">12</span> cuotas de <span class="cuota-highlight">${round(p1-bono)} €</span><br><span class="cuota-numero-azul">12</span> cuotas de <span class="cuota-highlight">${round(p2-bono)} €</span></div>` : `<div class="cuota-bloque">24 cuotas de <span class="cuota-highlight">${round(p2-bono)} €</span></div>`}
				<div class="linea-unificada">Última cuota final: <b>${VR} €</b></div>
				<div class="linea-unificada">Total pagar: <span class="total-verde">${round(tot)} €</span></div>
				<div class="linea-unificada">Intereses: <span class="interes-rojo">${round(tot - VR - (PV-VR) + (bono*24))} €</span></div></div>`;
		}
		
		document.getElementById('soloSegundoAnio').onchange = () => { if(PV) { dibuja(); scroll(); } };
		document.getElementById('importe-compras').oninput = () => { if(PV) dibuja(); };
		document.getElementById("rango-fechas").textContent = new Date().getFullYear() > 2026 ? `2026 - ${new Date().getFullYear()}` : '2026';
	</script>
</body>
</html>
